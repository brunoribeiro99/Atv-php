<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrada de Produtos</title>
    <link rel="stylesheet" href="estilo.css"/>
</head>
<body>

<div class="container-vendas">
    <h3>Cadastro de Produto</h3>

    <form method="get" action="produtos.php" id="formCarrinho">

        <fieldset class="fieldset-estiloso">
            <legend class="legend-estilo">Escolha a Moto</legend>
            <input type="radio" name="moto" value="Harley Davison"> Harley Davison Fat Boy<br>
            <input type="radio" name="moto" value="Kawasaki Ninja"> Kawasaki Ninja H2R<br>
            <input type="radio" name="moto" value="Ducati Panigale"> Ducati Panigale V4<br>
        </fieldset>

        <fieldset class="fieldset-estiloso">
            <legend class="legend-estilo">Valor do Produto</legend>
            <input type="number" name="preco_unit" placeholder="Ex: 80000" step="0.01">
        </fieldset>

        <fieldset class="fieldset-estiloso">
            <legend class="legend-estilo">País de Origem</legend>
            <input type="radio" name="pais" value="e"> EUA<br>
            <input type="radio" name="pais" value="m"> México<br>
            <input type="radio" name="pais" value="o"> Outros<br>
        </fieldset>

        <fieldset class="fieldset-estiloso">
            <legend class="legend-estilo">Meio de Transporte</legend>
            <input type="radio" name="transporte" value="t"> Terrestre<br>
            <input type="radio" name="transporte" value="f"> Fluvial<br>
            <input type="radio" name="transporte" value="a"> Aéreo<br>
        </fieldset>

        <fieldset class="fieldset-estiloso">
            <legend class="legend-estilo">Carga Perigosa</legend>
            <input type="radio" name="carga" value="sim"> Sim<br>
            <input type="radio" name="carga" value="nao"> Não<br> 
        </fieldset>

        <button type="button" onclick="adicionarProduto()">Adicionar ao Carrinho</button>
        <input class="botao-enviar" type="submit" value="Finalizar Compra"/>

    </form>

    <h4>Carrinho:</h4>
    <ul id="listaCarrinho"></ul>
</div>

<script>
let carrinho = [];

function adicionarProduto() {

    let moto = document.querySelector("[name='moto']:checked");
    let preco = document.querySelector("[name='preco_unit']").value;
    let pais = document.querySelector("[name='pais']:checked");
    let transporte = document.querySelector("[name='transporte']:checked");
    let carga = document.querySelector("[name='carga']:checked");

    if (!moto || !preco || !pais || !transporte || !carga) {
        alert("Preencha todos os campos!");
        return;
    }

    let produto = {
        moto: moto.value,
        preco: preco,
        pais: pais.value,
        transporte: transporte.value,
        carga: carga.value
    };

    carrinho.push(produto);

    atualizarCarrinho();
    atualizarInputsHidden();
}

function atualizarCarrinho() {
    let lista = document.getElementById("listaCarrinho");
    lista.innerHTML = "";

    carrinho.forEach((item, index) => {
        lista.innerHTML += `
            <li>
                ${item.moto} - R$ ${item.preco}
                <button onclick="removerItem(${index})">❌</button>
            </li>
        `;
    });
}

function removerItem(index) {
    carrinho.splice(index, 1);
    atualizarCarrinho();
    atualizarInputsHidden();
}

function atualizarInputsHidden() {
    let form = document.getElementById("formCarrinho");

    document.querySelectorAll(".hidden-item").forEach(e => e.remove());

    carrinho.forEach(item => {
        form.innerHTML += `
            <input type="hidden" class="hidden-item" name="moto[]" value="${item.moto}">
            <input type="hidden" class="hidden-item" name="preco_unit[]" value="${item.preco}">
            <input type="hidden" class="hidden-item" name="pais[]" value="${item.pais}">
            <input type="hidden" class="hidden-item" name="transporte[]" value="${item.transporte}">
            <input type="hidden" class="hidden-item" name="carga[]" value="${item.carga}">
        `;
    });
}
</script>

</body>
</html>
